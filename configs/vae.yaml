data:
  root_dir: "data/raw/mvtec_anomaly_detection"
  category: "bottle"
  img_size: 256

model:
  name: "vae"
  latent_dim: 128
  vae_beta: 1.0
  vae_recon_loss: "mse"

training:
  batch_size: 16
  num_workers: 4
  learning_rate: 0.0001
  num_epochs: 50

evaluation:
  metrics: ["auroc", "pixel_auroc"]
  method: "ssim"
  gaussian_sigma: 1.2

output:
  experiment_dir: "experiments/vae"
  save_images: true
